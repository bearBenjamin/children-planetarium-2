name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # или master, укажите вашу ветку

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/actions/checkout@v4
      - name: Setup Pages
        uses: actions/actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/actions/upload-pages-artifact@v3
        with:
          path: './dist' # Указываем GitHub брать файлы строго из dist!
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/actions/deploy-pages@v4
