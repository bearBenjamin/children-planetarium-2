name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Если ваша ветка называется master, замените на "master"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # ИСПРАВЛЕНО: правильный официальный путь

      - name: Set up Node.js
        uses: actions/setup-node@v4 # ИСПРАВЛЕНО: правильный официальный путь
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # ИСПРАВЛЕНО: правильный официальный путь
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # ИСПРАВЛЕНО: правильный официальный путь
